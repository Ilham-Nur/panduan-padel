<body class="bg-background text-on-background h-screen w-screen overflow-hidden flex flex-col font-body-md select-none">
<!-- Portrait Warning -->
<div class="landscape-warning hidden fixed inset-0 z-50 bg-surface-container flex-col items-center justify-center p-8 text-center">
<span class="material-symbols-outlined text-6xl text-primary mb-4" style="font-variation-settings: 'FILL' 1;">screen_rotation</span>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Mohon Putar Perangkat</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Aplikasi ini dioptimalkan untuk tampilan lanskap (mendatar).</p>
</div>

<div class="app-content flex flex-col h-full w-full max-w-7xl mx-auto">

<header class="bg-surface dark:bg-surface-dim w-full top-0 flex items-center justify-between px-container-padding h-touch-target-min w-full max-w-7xl mx-auto flex-shrink-0 z-10 shadow-sm">
<button class="w-touch-target-min h-touch-target-min flex items-center justify-start text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Skor 21</h1>
<button class="w-touch-target-min h-touch-target-min flex items-center justify-end text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Dashboard Area (3 Columns) -->
<main class="flex-1 flex flex-row overflow-hidden p-gutter gap-gutter">

<section class="flex-1 bg-surface-container-lowest rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-surface-container flex flex-col items-center justify-center p-4 touch-feedback cursor-pointer relative overflow-hidden group">
<div class="absolute inset-0 bg-primary-container opacity-0 group-active:opacity-10 transition-opacity duration-150"></div>
<div class="absolute top-4 left-4 right-4 flex justify-between items-start w-full px-4">
<div class="flex flex-col items-center w-full">
<span class="font-headline-md text-headline-md text-on-surface mb-1">Tim A</span>
<div class="flex items-center gap-2 text-on-surface-variant bg-surface-container-low px-3 py-1 rounded-full">
<span class="font-body-md text-body-md truncate max-w-[120px]">Pemain 1 &amp; Pemain 2</span>
<span class="material-symbols-outlined text-sm">edit</span>
</div>
</div>
</div>
<div class="mt-8 flex-1 flex items-center justify-center w-full">
<span class="font-score-display text-score-display text-on-surface">0</span>
</div>
<div class="absolute bottom-4 left-0 right-0 text-center text-on-surface-variant opacity-60 font-body-md text-body-md">
                    Ketuk untuk tambah skor
                </div>
</section>

<section class="flex-[1.2] flex flex-col gap-4">

</div>

<div class="h-full bg-primary rounded-full transition-all duration-300" style="width: 2%;"></div>
</div>
</div>
<!-- Middle Content Area (Flex-1) -->
<div class="flex-1 flex flex-col gap-4">

<button class="bg-primary-container text-on-primary-container font-headline-md text-headline-md px-6 py-3 rounded-lg shadow-sm hover:bg-opacity-90 active:scale-95 transition-all flex-1 max-w-[140px]">

                            </button>
<button class="bg-surface-container-high text-on-surface font-headline-md text-headline-md px-6 py-3 rounded-lg shadow-sm hover:bg-surface-variant active:scale-95 transition-all flex-1 max-w-[140px]">

</div>

<!-- Current Servis Status (Hidden initially, but included in layout) -->

</button>

</button>

<span class="material-symbols-outlined">menu</span>
</button>
</div>
</section>
